openapi: 3.0.4

info:
  title: Products Expiration API
  description: API simple desarrollada para demostrar un flujo de Integración Continua, testing automatizado, inspección de código, despliegue en Docker y Spec Driven Development.
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /
    description: Servidor actual donde se encuentre desplegada la API

security: []

tags:
  - name: Health
    description: Endpoints relacionados con la verificación del estado de la API

paths:
  /health:
    get:
      summary: Verifica el estado de la API.
      description: Retorna el estado actual del servicio para comprobar que la API se encuentra activa y respondiendo correctamente.
      operationId: getHealth
      tags:
        - Health
      security: []
      responses:
        "200":
          description: La API está funcionando correctamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                service: products-expiration-api

        "404":
          description: Recurso no encontrado.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: not_found
                message: Recurso no encontrado.

components:
  schemas:
    HealthResponse:
      type: object
      description: Respuesta del endpoint de verificación de estado de la API.
      additionalProperties: false
      required:
        - status
        - service
      properties:
        status:
          type: string
          description: Estado actual de la API.
          enum:
            - ok
          example: ok
        service:
          type: string
          description: Nombre del servicio que responde.
          enum:
            - products-expiration-api
          example: products-expiration-api

    ErrorResponse:
      type: object
      description: Respuesta estándar para errores de la API.
      additionalProperties: false
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Código identificador del error.
          example: not_found
        message:
          type: string
          description: Descripción legible del error.
          example: Recurso no encontrado.